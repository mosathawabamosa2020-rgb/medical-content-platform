groups:
  - name: platform
    rules:
      - alert: QueueDepthHigh
        expr: queue_depth_pdf > 100 or queue_depth_embed > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Queue depth exceeds 100 for 5+ minutes"
      - alert: EmbeddingFallbackActive
        expr: increase(embedding_fallback_activated_total[10m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Embedding fallback activated - vector retrieval quality degraded"
