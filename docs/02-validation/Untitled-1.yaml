# ─────────────────────────────────────────────────────────────
# SECTION 3: ARABIC FTS — VERIFICATION TEAM RULING
# ─────────────────────────────────────────────────────────────

Decision: Use pg_catalog.arabic AS-IS for Phase 1.
- Two separate tsvector columns per language on KnowledgeChunk (text_ar → fts_arabic, text → fts_english)
- Add `unaccent` only in Phase 2 IF diacritic noise is observed in retrieval testing
- Bilingual query pattern: WHERE fts_arabic @@ ... OR fts_english @@ ...

# ─────────────────────────────────────────────────────────────
# SECTION 4: EMBEDDING MODEL — VERIFICATION TEAM RULING
# ─────────────────────────────────────────────────────────────

Decision: Stay on OpenAI (1536-dim) for Phase 1. Switch to BAAI/bge-m3 (1024-dim) in Phase 2.
- bge-m3: strong multilingual retrieval, 8k token context, Arabic+English cross-lingual
- Alternative: intfloat/multilingual-e5-large-instruct
- Arabic-heavy workloads: Swan-Large (optional)
- Phase 2 migration requires: column resize + full re-embedding + maintenance window

# ─────────────────────────────────────────────────────────────
# SECTION 5: MINIO — VERIFICATION TEAM RULING
# ─────────────────────────────────────────────────────────────

Decision: MinIO is APPROVED for Phase 1 storage.
- Replaces local uploads/ folder
- S3-compatible via @aws-sdk/client-s3
- forcePathStyle: true is MANDATORY
- Three buckets: references/, processed/, images/
- Legacy scripts (scrape_fda.js, scrape_fda_hardened.js) may keep uploads/ writes
until Phase 2 — they are offline CLI tools, not API-facing

