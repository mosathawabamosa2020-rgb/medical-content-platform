TASK 2.3: Implement Hybrid Search Service
- File: lib/search/hybrid.search.ts
- Combines vector search (cosine similarity via pgvector) + FTS (bilingual)
- Supports filters: deviceId, chunkType, audienceLevel, language
- Parameters: query, limit (default 20), minScore (default 0.3)
- Flow:
  1. Generate query embedding
  2. Vector search on knowledge_chunks (cosine similarity)
  3. FTS search (fts_arabic OR fts_english)
  4. Merge, deduplicate, return full chunk data with reference+device

