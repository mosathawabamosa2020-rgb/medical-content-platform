TASK 7.2: Document Definition of Done for Knowledge Units
A KnowledgeChunk is APPROVED when ALL of these are true:
1. isApproved = true in knowledge_chunks table
2. A linked ReviewTask exists with status = ACCEPTED
3. reviewedAt is populated on the ReviewTask
4. At least one VerificationLog with action = ACCEPTED and performedBy set
5. An AuditLog with action = APPROVE exists for this chunk's reference
6. embedding column is NOT NULL (chunk has been embedded)

