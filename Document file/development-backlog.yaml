project:
  id: med-knowledge-platform
  name_ar: المنصة المعرفية العلمية الذكية للأجهزة الطبية
  name_en: Medical Devices Intelligent Scientific Knowledge Platform
  version: 1.0.0
  status: approved-draft
  source_of_truth:
    - TEAM_IMPLEMENTATION_GUIDE.md
    - development-backlog.yaml

execution_policy:
  architecture_style: modular-monolith
  primary_stack:
    frontend: Next.js
    backend: Node.js
    orm: Prisma
    database: PostgreSQL
    vector_extension: pgvector
    containers: Docker
  mandatory_rules:
    - no_bypass_of_scientific_review
    - approved_knowledge_only_for_generation
    - opensource_first
    - traceability_required
    - migrations_required
    - typed_implementation_required

phases:
  - id: PHASE-00
    name: Foundation & Bootstrap
    goal: Establish local development, repository standards, containers, and engineering workflow.
  - id: PHASE-01
    name: Core Data & Taxonomy
    goal: Build schema and medical taxonomy foundations.
  - id: PHASE-02
    name: References & Ingestion
    goal: Manage references, files, extraction, chunking, and indexing preparation.
  - id: PHASE-03
    name: Semantic Retrieval & Verification
    goal: Implement embeddings, search, scoring, and scientific review workflow.
  - id: PHASE-04
    name: Knowledge Base & Content Generation
    goal: Deliver approved knowledge browsing, generation, and publishing tasks.
  - id: PHASE-05
    name: Operational Readiness
    goal: Dashboard, settings, testing, logging, monitoring, backup, and release hardening.

epics:
  - id: EPIC-01
    phase: PHASE-00
    title: Repository, Environment, and Engineering Foundation
    objective: Create a reliable development baseline for the whole team.

  - id: EPIC-02
    phase: PHASE-01
    title: Database Schema and Prisma Foundation
    objective: Build the canonical relational and vector-ready schema.

  - id: EPIC-03
    phase: PHASE-01
    title: Medical Taxonomy Module
    objective: Manage departments, devices, and models.

  - id: EPIC-04
    phase: PHASE-02
    title: References and File Lifecycle Management
    objective: Manage scientific references and source files end-to-end.

  - id: EPIC-05
    phase: PHASE-02
    title: Ingestion Pipeline and Knowledge Chunking
    objective: Convert references into traceable knowledge chunks.

  - id: EPIC-06
    phase: PHASE-03
    title: Embeddings, Retrieval, and Source Scoring
    objective: Enable semantic retrieval with quality-aware source ranking.

  - id: EPIC-07
    phase: PHASE-03
    title: Scientific Verification Workflow
    objective: Ensure no knowledge becomes approved without review.

  - id: EPIC-08
    phase: PHASE-04
    title: Knowledge Base Experience
    objective: Present approved device knowledge in a structured searchable UI.

  - id: EPIC-09
    phase: PHASE-04
    title: Content Generation and Publishing Tasks
    objective: Generate publishable scientific content from approved knowledge.

  - id: EPIC-10
    phase: PHASE-05
    title: Dashboard, Settings, and Operational Control Center
    objective: Provide centralized operator visibility and controls.

  - id: EPIC-11
    phase: PHASE-05
    title: Quality, Security, Monitoring, and Backup
    objective: Harden the platform for controlled release.

tasks:
  - id: TASK-001
    epic: EPIC-01
    title: Define repository structure and module boundaries
    priority: critical
    owner: architecture
    dependencies: []
    deliverables:
      - canonical app folder structure
      - module naming rules
      - layer separation conventions
    acceptance_criteria:
      - all core modules have reserved folders
      - architecture layers are documented
      - naming conventions are written and shared

  - id: TASK-002
    epic: EPIC-01
    title: Prepare Docker-based local development environment
    priority: critical
    owner: devops
    dependencies: [TASK-001]
    deliverables:
      - docker compose for app and database
      - local startup instructions
      - persistent database volume strategy
    acceptance_criteria:
      - project services can start locally using containers
      - PostgreSQL is reachable from application runtime
      - environment bootstrap steps are documented

  - id: TASK-003
    epic: EPIC-01
    title: Configure engineering quality tooling
    priority: high
    owner: platform
    dependencies: [TASK-001]
    deliverables:
      - linting rules
      - formatting rules
      - pre-commit quality checks
      - CI build validation baseline
    acceptance_criteria:
      - lint command exists and passes on base branch
      - formatting rules are enforced
      - CI validates build at minimum

  - id: TASK-004
    epic: EPIC-02
    title: Design Prisma schema for core domain entities
    priority: critical
    owner: backend
    dependencies: [TASK-002]
    deliverables:
      - prisma schema for departments devices models references files chunks reviews content tasks
      - base relations and constraints
      - timestamps and status fields
    acceptance_criteria:
      - all mandatory entities exist in schema
      - foreign keys are represented correctly
      - statuses support core workflows

  - id: TASK-005
    epic: EPIC-02
    title: Enable pgvector and vector-ready persistence model
    priority: critical
    owner: backend
    dependencies: [TASK-004]
    deliverables:
      - pgvector extension activation approach
      - embeddings persistence model
      - vector query compatibility plan
    acceptance_criteria:
      - vector storage path is documented and implementable
      - embeddings entity is linked to chunks
      - migration path includes extension requirements

  - id: TASK-006
    epic: EPIC-02
    title: Create initial migrations and seed baseline taxonomy data
    priority: high
    owner: backend
    dependencies: [TASK-004, TASK-005]
    deliverables:
      - initial migration set
      - seed strategy for medical departments
      - seed placeholders for devices and models
    acceptance_criteria:
      - schema can be created from migrations
      - baseline departments can be seeded
      - migration instructions are documented

  - id: TASK-007
    epic: EPIC-03
    title: Implement Medical Departments CRUD API
    priority: high
    owner: backend
    dependencies: [TASK-006]
    deliverables:
      - create update list get department endpoints
      - validation rules
      - status activation handling
    acceptance_criteria:
      - departments can be created and updated safely
      - invalid input is rejected
      - list endpoint supports operational usage

  - id: TASK-008
    epic: EPIC-03
    title: Implement Medical Devices CRUD API with department linkage
    priority: critical
    owner: backend
    dependencies: [TASK-007]
    deliverables:
      - device CRUD endpoints
      - department relation logic
      - knowledge completion state field handling
    acceptance_criteria:
      - devices cannot exist without valid department linkage
      - completion status can be stored and retrieved
      - list responses include department context

  - id: TASK-009
    epic: EPIC-03
    title: Implement Device Models CRUD API
    priority: high
    owner: backend
    dependencies: [TASK-008]
    deliverables:
      - model CRUD endpoints
      - manufacturer and production metadata support
      - device relation validation
    acceptance_criteria:
      - models are linked to devices correctly
      - manufacturer metadata is persisted
      - invalid device references are blocked

  - id: TASK-010
    epic: EPIC-03
    title: Build taxonomy management UI
    priority: high
    owner: frontend
    dependencies: [TASK-007, TASK-008, TASK-009]
    deliverables:
      - departments table and form
      - devices table and form
      - models table and form
      - Arabic-first management screens
    acceptance_criteria:
      - operator can manage taxonomy from UI
      - forms validate required fields
      - relations are visible and understandable

  - id: TASK-011
    epic: EPIC-04
    title: Implement references CRUD and metadata model
    priority: critical
    owner: backend
    dependencies: [TASK-006]
    deliverables:
      - reference CRUD endpoints
      - source type metadata
      - device and model linking strategy
    acceptance_criteria:
      - references can be created with source metadata
      - source URL and type are persisted
      - references can link to domain entities

  - id: TASK-012
    epic: EPIC-04
    title: Implement reference file upload lifecycle
    priority: critical
    owner: backend
    dependencies: [TASK-011]
    deliverables:
      - file upload endpoint
      - storage path strategy
      - processing status lifecycle
    acceptance_criteria:
      - files can be uploaded and linked to references
      - file processing state is visible
      - unsupported files are rejected safely

  - id: TASK-013
    epic: EPIC-04
    title: Build reference management UI
    priority: high
    owner: frontend
    dependencies: [TASK-011, TASK-012, TASK-010]
    deliverables:
      - references table
      - upload flow
      - status indicators
      - manual linking controls
    acceptance_criteria:
      - operator can upload and inspect references
      - processing statuses are clearly shown
      - references can be linked to devices/models from UI

  - id: TASK-014
    epic: EPIC-05
    title: Implement PDF text extraction pipeline
    priority: critical
    owner: data
    dependencies: [TASK-012]
    deliverables:
      - parser integration
      - extraction service
      - extraction job state handling
    acceptance_criteria:
      - text can be extracted from supported PDF files
      - extraction failures are logged
      - extraction status can be tracked

  - id: TASK-015
    epic: EPIC-05
    title: Implement OCR fallback for scanned files
    priority: medium
    owner: data
    dependencies: [TASK-014]
    deliverables:
      - OCR fallback path
      - scanned file detection strategy
      - OCR result persistence plan
    acceptance_criteria:
      - scanned documents have fallback processing path
      - OCR usage is traceable
      - failures do not corrupt pipeline state

  - id: TASK-016
    epic: EPIC-05
    title: Implement chunking and content category classification
    priority: critical
    owner: data
    dependencies: [TASK-014]
    deliverables:
      - chunking logic
      - page-level mapping
      - category detection fields
      - chunk persistence
    acceptance_criteria:
      - extracted text is split into knowledge chunks
      - each chunk retains source file relation
      - page number and content type can be stored

  - id: TASK-017
    epic: EPIC-05
    title: Add audience level and importance metadata to chunks
    priority: medium
    owner: backend
    dependencies: [TASK-016]
    deliverables:
      - schema support for audienceLevel importanceScore language
      - metadata persistence path
    acceptance_criteria:
      - chunk records support audience and importance metadata
      - metadata is accessible in retrieval and content workflows

  - id: TASK-018
    epic: EPIC-06
    title: Implement embeddings generation workflow
    priority: critical
    owner: ai
    dependencies: [TASK-016, TASK-005]
    deliverables:
      - embeddings service integration
      - embeddings generation job
      - chunk-to-embedding persistence
    acceptance_criteria:
      - embeddings can be generated for chunks
      - vectors are stored and linked correctly
      - failed embeddings are retryable

  - id: TASK-019
    epic: EPIC-06
    title: Implement hybrid retrieval search
    priority: critical
    owner: backend
    dependencies: [TASK-018, TASK-016]
    deliverables:
      - vector search queries
      - text search queries
      - hybrid ranking strategy
    acceptance_criteria:
      - search can retrieve relevant chunks
      - approved metadata can be used in filtering
      - results are ranked using a defined strategy

  - id: TASK-020
    epic: EPIC-06
    title: Implement source quality scoring model
    priority: high
    owner: backend
    dependencies: [TASK-011]
    deliverables:
      - scoring criteria fields
      - score calculation logic
      - score persistence
    acceptance_criteria:
      - references can store quality scores
      - scoring inputs are explainable
      - higher quality sources can be prioritized in retrieval

  - id: TASK-021
    epic: EPIC-07
    title: Implement scientific review task model and API
    priority: critical
    owner: backend
    dependencies: [TASK-016]
    deliverables:
      - review task endpoints
      - review statuses
      - review notes
      - review levels
    acceptance_criteria:
      - references or chunks can enter review workflow
      - acceptance rejection and change request states exist
      - review decisions are stored with timestamps

  - id: TASK-022
    epic: EPIC-07
    title: Implement audit log for knowledge and review changes
    priority: critical
    owner: backend
    dependencies: [TASK-021]
    deliverables:
      - audit log model
      - mutation logging strategy
      - review decision traceability
    acceptance_criteria:
      - key review and content decisions are audit logged
      - change history is queryable
      - actor and timestamp are preserved

  - id: TASK-023
    epic: EPIC-07
    title: Build scientific verification UI
    priority: high
    owner: frontend
    dependencies: [TASK-021, TASK-022, TASK-013]
    deliverables:
      - review queue screen
      - chunk/reference review viewer
      - accept reject change request actions
      - notes panel
    acceptance_criteria:
      - reviewer can complete review decisions from UI
      - pending and completed review states are visible
      - decision notes are persisted

  - id: TASK-024
    epic: EPIC-08
    title: Implement approved knowledge retrieval API
    priority: critical
    owner: backend
    dependencies: [TASK-019, TASK-021]
    deliverables:
      - approved-only query layer
      - device knowledge aggregation endpoint
      - filter support by department and status
    acceptance_criteria:
      - only approved knowledge is returned
      - device detail responses are structured by content sections
      - filters work correctly

  - id: TASK-025
    epic: EPIC-08
    title: Build knowledge base search and device details UI
    priority: critical
    owner: frontend
    dependencies: [TASK-024, TASK-010]
    deliverables:
      - search screen
      - filter controls
      - device cards with completion indicators
      - detail tabs with references
    acceptance_criteria:
      - operator can browse approved devices by department
      - search supports device discovery
      - source references are visible in device details

  - id: TASK-026
    epic: EPIC-09
    title: Implement publishing task scheduling logic
    priority: high
    owner: backend
    dependencies: [TASK-024]
    deliverables:
      - publishing tasks entity behavior
      - balanced scheduling logic
      - status lifecycle for task execution
    acceptance_criteria:
      - tasks can be scheduled by date section and device
      - statuses support scheduled completed postponed
      - logic can avoid uneven coverage where possible

  - id: TASK-027
    epic: EPIC-09
    title: Implement generated content model and template engine
    priority: critical
    owner: backend
    dependencies: [TASK-024, TASK-026]
    deliverables:
      - content generation service
      - template strategy
      - generated content persistence
      - revision support baseline
    acceptance_criteria:
      - generated content is based on approved knowledge only
      - final text can be saved with status metadata
      - generated content is linked to device and department

  - id: TASK-028
    epic: EPIC-09
    title: Implement image prompt generation support
    priority: medium
    owner: ai
    dependencies: [TASK-027]
    deliverables:
      - prompt builder for scientific imagery
      - prompt metadata persistence
      - source-image-first workflow rules
    acceptance_criteria:
      - image prompt includes device type environment and realism guidance
      - prompt generation is traceable
      - workflow respects source image preference first

  - id: TASK-029
    epic: EPIC-09
    title: Build content generation UI and preview workflow
    priority: high
    owner: frontend
    dependencies: [TASK-026, TASK-027, TASK-028, TASK-025]
    deliverables:
      - daily task timeline
      - generation form
      - content preview
      - copy/save actions
    acceptance_criteria:
      - operator can generate content from approved knowledge
      - preview is shown before saving
      - generated content can be copied or saved

  - id: TASK-030
    epic: EPIC-10
    title: Implement dashboard metrics APIs
    priority: high
    owner: backend
    dependencies: [TASK-007, TASK-008, TASK-011, TASK-016, TASK-021, TASK-026]
    deliverables:
      - counts by departments devices references reviews tasks
      - completion metrics
      - indexing status metrics
    acceptance_criteria:
      - dashboard data is available via structured API
      - metrics reflect real entity states
      - incomplete knowledge counts are visible

  - id: TASK-031
    epic: EPIC-10
    title: Build dashboard and operator portal UI
    priority: high
    owner: frontend
    dependencies: [TASK-030, TASK-013, TASK-023, TASK-025, TASK-029]
    deliverables:
      - main portal layout
      - sidebar navigation
      - stats cards
      - quick status panels
    acceptance_criteria:
      - dashboard shows high-value operational insights
      - navigation connects all core modules
      - UI is Arabic-first and readable

  - id: TASK-032
    epic: EPIC-10
    title: Implement settings foundation
    priority: medium
    owner: backend
    dependencies: [TASK-030]
    deliverables:
      - settings persistence model
      - general configuration endpoints
      - AI and processing configuration placeholders
    acceptance_criteria:
      - settings can be saved and retrieved
      - foundation supports future extension
      - configuration changes are traceable

  - id: TASK-033
    epic: EPIC-10
    title: Build settings UI
    priority: medium
    owner: frontend
    dependencies: [TASK-032, TASK-031]
    deliverables:
      - general settings screen
      - processing settings form
      - AI settings placeholders
    acceptance_criteria:
      - operator can access and modify supported settings
      - forms are understandable and validated
      - unsupported future fields are clearly labeled

  - id: TASK-034
    epic: EPIC-11
    title: Implement centralized error handling and logging
    priority: critical
    owner: backend
    dependencies: [TASK-003]
    deliverables:
      - standardized error model
      - logging strategy
      - request failure handling policy
    acceptance_criteria:
      - critical errors are logged consistently
      - API responses follow an error format
      - secrets are not leaked in logs

  - id: TASK-035
    epic: EPIC-11
    title: Implement test baseline for critical workflows
    priority: critical
    owner: qa
    dependencies: [TASK-021, TASK-024, TASK-027]
    deliverables:
      - unit tests for scheduling retrieval and verification logic
      - integration tests for API and DB flows
      - smoke test checklist
    acceptance_criteria:
      - critical workflows have automated coverage baseline
      - tests run successfully in CI
      - failing paths are reported clearly

  - id: TASK-036
    epic: EPIC-11
    title: Implement backup and restore operational baseline
    priority: high
    owner: devops
    dependencies: [TASK-002, TASK-006]
    deliverables:
      - backup schedule definition
      - backup storage plan
      - restore verification procedure
    acceptance_criteria:
      - backups can be generated regularly
      - restore steps are documented and testable
      - operational ownership is clear

  - id: TASK-037
    epic: EPIC-11
    title: Prepare monitoring and health visibility baseline
    priority: medium
    owner: devops
    dependencies: [TASK-034]
    deliverables:
      - service health checks
      - monitoring integration placeholders
      - operational alerting baseline
    acceptance_criteria:
      - service health can be inspected
      - monitoring path is documented
      - critical failure visibility is improved

  - id: TASK-038
    epic: EPIC-11
    title: Implement authentication foundation and owner access path
    priority: high
    owner: backend
    dependencies: [TASK-003, TASK-004]
    deliverables:
      - login flow foundation
      - user entity relation support
      - owner role bootstrap
    acceptance_criteria:
      - authenticated access path exists for the operator
      - owner role can be initialized
      - future role expansion remains possible

  - id: TASK-039
    epic: EPIC-11
    title: Build authentication UI foundation
    priority: medium
    owner: frontend
    dependencies: [TASK-038]
    deliverables:
      - login screen
      - forgot password placeholder flow
      - basic auth entry screens
    acceptance_criteria:
      - operator can access authentication screen
      - UI supports future auth expansion
      - user journey is clear and minimal

  - id: TASK-040
    epic: EPIC-11
    title: Create ADR and developer documentation baseline
    priority: medium
    owner: architecture
    dependencies: [TASK-001, TASK-004]
    deliverables:
      - ADR template
      - first architecture decisions recorded
      - developer onboarding notes
    acceptance_criteria:
      - major architecture decisions have written records
      - onboarding reference exists for new developers
      - documentation location is agreed by team

definition_of_done:
  required:
    - implementation_completed
    - acceptance_criteria_met
    - build_passes
    - lint_passes
    - tests_pass_for_applicable_scope
    - migrations_added_if_needed
    - documentation_updated_if_behavior_changed
    - task_id_referenced_in_branch_or_pr

priority_legend:
  critical: Must be delivered for phase success.
  high: Strongly required for operational usability.
  medium: Important but can follow after critical path stabilization.
  low: Optional enhancement.
